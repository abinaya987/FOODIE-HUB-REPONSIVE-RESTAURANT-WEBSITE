<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Form</title>
  <link rel='stylesheet' href='Login.css'>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Poppins&display=swap'>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Login.html">Login</a></li>
        <li><a href="About Us.html">About Us</a></li>
        <li><a href="Explore Foods.html">Explore Foods</a></li>
        <li><a href="Conacts Us.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="wrapper">
    <form id="loginForm" class="login_box" action="#" method="post">
      <div class="login-header">
        <span>Login</span>
      </div>

      <div class="input_box">
        <input type="text" id="user" class="input-field" placeholder="Username">
        <label for="user" class="label"></label>
        <i class="bx bx-user icon"></i>
      </div>

      <div class="input_box">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <label for="pass" class="label"></label>
        <i class="bx bx-lock-alt icon"></i>
      </div>

      <div class="remember-forgot">
        <div class="remember-me">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <div class="forgot">
          <a href="Register.html">Forgot password?</a>
        </div>
      </div>

      <div class="input_box">
        <input type="submit" class="input-submit" value="Login">
      </div>

      <div class="register">
        <span>Don't have an account? <a href="Register.html">Register</a></span>
      </div>
    </form>
  </div>
  <script>
  $(document).ready(function () {
    $('#loginForm').on('submit', function (e) {
      e.preventDefault();

      const user = $('#user').val().trim();
      const pass = $('#pass').val().trim();
      const remember = $('#remember').is(':checked');

      // ✅ Username: Exactly 8 characters, at least one uppercase letter
      const userRegex = /^(?=.*[A-Z]).{8}$/;

      // ✅ Password: Exactly 8 characters, at least one special character
      const passRegex = /^(?=.*[\W_]).{8}$/;

      if (!userRegex.test(user)) {
        alert('Username must be exactly 8 characters and include at least one uppercase letter.');
        return;
      }

      if (!passRegex.test(pass)) {
        alert('Password must be exactly 8 characters and include at least one special character.');
        return;
      }

      if (!remember) {
        alert('Please check "Remember me" to proceed.');
        return;
      }

      alert('Validation passed. Logging in...');
      // 🔒 You can now send login data to the server or redirect
    });
  });
</script>

  
  
  
  <!-- Bootstrap JS (Optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
